<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /opt/aphost/public

    <Directory /opt/aphost/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/aphost_error.log
    CustomLog ${APACHE_LOG_DIR}/aphost_access.log combined
</VirtualHost>
